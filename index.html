<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富士風底片濾波器 Web App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-group { margin: 20px 0; }
        button { padding: 10px 15px; margin: 5px; border: none; background-color: #2c3e50; color: white; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #1a252f; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        canvas { max-width: 100%; height: auto; margin-top: 20px; border-radius: 5px; border: 1px solid #ddd; }
        #loading { display: none; color: #e74c3c; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 FUJIFILM底片風格濾波器</h2>
    <p>上傳圖片，套用帶有底片色彩與顆粒的平滑濾波器</p>
    
    <input type="file" id="upload" accept="image/*">
    
    <div class="btn-group">
        <button id="btn3x3" disabled>3x3 輕微修飾</button>
        <button id="btn5x5" disabled>5x5 柔焦感</button>
        <button id="btn9x9" disabled>9x9 夢幻氛圍</button>
        <button id="btnReset" disabled>還原原圖</button>
    </div>

    <div id="loading">處理中，請稍候... (矩陣越大計算越久)</div>
    
    <canvas id="canvas"></canvas>
</div>

<script>
    const uploadInput = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const buttons = [document.getElementById('btn3x3'), document.getElementById('btn5x5'), document.getElementById('btn9x9'), document.getElementById('btnReset')];
    const loading = document.getElementById('loading');
    
    let originalImageData = null;

    // 將二維矩陣轉為一維陣列供 JS 運算，這裡使用你提供的高斯平滑數值
    const kernels = {
        '3x3': [
            1/16, 2/16, 1/16,
            2/16, 4/16, 2/16,
            1/16, 2/16, 1/16
        ],
        '5x5': [
            1/256, 4/256, 6/256, 4/256, 1/256,
            4/256, 16/256, 24/256, 16/256, 4/256,
            6/256, 24/256, 36/256, 24/256, 6/256,
            4/256, 16/256, 24/256, 16/256, 4/256,
            1/256, 4/256, 6/256, 4/256, 1/256
        ],
        '9x9': [
            1, 4, 10, 16, 19, 16, 10, 4, 1,
            4, 16, 36, 64, 76, 64, 36, 16, 4,
            10, 36, 81, 144, 171, 144, 81, 36, 10,
            16, 64, 144, 256, 304, 256, 144, 64, 16,
            19, 76, 171, 304, 361, 304, 171, 76, 19,
            16, 64, 144, 256, 304, 256, 144, 64, 16,
            10, 36, 81, 144, 171, 144, 81, 36, 10,
            4, 16, 36, 64, 76, 64, 36, 16, 4,
            1, 4, 10, 16, 19, 16, 10, 4, 1
        ].map(x => x / 4096)
    };

    // 處理圖片上傳
    uploadInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // 為了避免瀏覽器當機，將過大的圖片縮放處理
                const MAX_WIDTH = 800;
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height = Math.floor(height * (MAX_WIDTH / width));
                    width = MAX_WIDTH;
                }

                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                originalImageData = ctx.getImageData(0, 0, width, height);
                
                buttons.forEach(btn => btn.disabled = false);
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    // 富士色彩調色與顆粒效果 (Color Grading & Grain)
    // 富士 FXN R 風格調色與顆粒效果
    // 富士風電影片濾鏡 (Fujifilm Cine-look with Split Toning)
    // 終極版：專業青橘電影感 + 富士底片模擬
    function applyFujifilmLook(imageData) {
        const data = imageData.data;
        for (let i = 0; i < data.length; i += 4) {
            let r = data[i];
            let g = data[i + 1];
            let b = data[i + 2];

            // 1. 計算人類視覺真實亮度 (Luminance, 0~255)
            let luma = 0.299 * r + 0.587 * g + 0.114 * b;
            
            // 將 RGB 轉為 0~1 的小數，這在色彩學運算上會精準很多
            let rNorm = r / 255.0;
            let gNorm = g / 255.0;
            let bNorm = b / 255.0;

            // 2. 增加底片對比度 (簡易 S 曲線)
            // 讓暗的地方更暗，亮的地方更亮，畫面才不會灰濛濛
            let contrast = 1.15; // 1.4 代表增加 40% 對比
            rNorm = (rNorm - 0.5) * contrast + 0.5;
            gNorm = (gNorm - 0.5) * contrast + 0.5;
            bNorm = (bNorm - 0.5) * contrast + 0.5;

            // 3. 平滑的青橘色調分離 (Smooth Split Toning)
            // 算出當前像素偏向暗部還是亮部的「比例 (0.0 ~ 1.0)」
            let shadowWeight = Math.max(0, 1.0 - (luma / 120.0));  // 越暗，這個值越接近 1
            let highlightWeight = Math.max(0, (luma - 130.0) / 125.0); // 越亮，這個值越接近 1

            // 👉 暗部染青藍色 (Teal)
            rNorm -= 0.15 * shadowWeight; // 抽離紅色
            gNorm += 0.18 * shadowWeight; // 加一點綠色 (富士靈魂)
            bNorm += 0.22 * shadowWeight; // 大量加藍色

            // 👉 亮部染橘金色 (Orange)
            rNorm += 0.20 * highlightWeight; // 加紅色
            gNorm += 0.06 * highlightWeight; // 加綠色 (紅+綠=橘黃)
            bNorm -= 0.01 * highlightWeight; // 抽離藍色 (去除白光感)

            // 轉回 0~255 數值
            r = rNorm * 255;
            g = gNorm * 255;
            b = bNorm * 255;

            // 4. 富士底片奶油黑 (Lifted Blacks)
            // 這是產生底片感的關鍵：強制把「純黑色」墊高，變成帶有青綠色的深灰
            let fadeAmount = 22; // 數值越高，越像放了 20 年的褪色底片
            r = Math.max(r, fadeAmount * 0.8);
            g = Math.max(g, fadeAmount * 1.0); // 暗部透綠
            b = Math.max(b, fadeAmount * 1.1); // 暗部透藍

            // 5. 底片顆粒 (Film Grain)
            let noise = (Math.random() - 0.5) * 21;
            r += noise;
            g += noise;
            b += noise;

            // 確保數值介於 0~255 之間，防止色彩爆掉
            data[i] = Math.min(255, Math.max(0, r));
            data[i + 1] = Math.min(255, Math.max(0, g));
            data[i + 2] = Math.min(255, Math.max(0, b));
        }
        return imageData;
    }

    // 卷積運算 (對應 Python 的 filter2D)
    function applyConvolution(imageData, weights) {
        const side = Math.round(Math.sqrt(weights.length));
        const halfSide = Math.floor(side / 2);
        const src = imageData.data;
        const sw = imageData.width;
        const sh = imageData.height;
        const output = ctx.createImageData(sw, sh);
        const dst = output.data;

        for (let y = 0; y < sh; y++) {
            for (let x = 0; x < sw; x++) {
                const dstOff = (y * sw + x) * 4;
                let r = 0, g = 0, b = 0;

                for (let cy = 0; cy < side; cy++) {
                    for (let cx = 0; cx < side; cx++) {
                        const scy = y + cy - halfSide;
                        const scx = x + cx - halfSide;
                        
                        if (scy >= 0 && scy < sh && scx >= 0 && scx < sw) {
                            const srcOff = (scy * sw + scx) * 4;
                            const wt = weights[cy * side + cx];
                            r += src[srcOff] * wt;
                            g += src[srcOff + 1] * wt;
                            b += src[srcOff + 2] * wt;
                        }
                    }
                }
                dst[dstOff] = r;
                dst[dstOff + 1] = g;
                dst[dstOff + 2] = b;
                dst[dstOff + 3] = src[dstOff + 3]; // Alpha 透明度不變
            }
        }
        return output;
    }

    // 處理按鈕點擊事件 (使用 setTimeout 讓 UI 有時間顯示 Loading)
    function processFilter(kernelSize) {
        loading.style.display = 'block';
        // 延遲執行讓畫面能更新 Loading 狀態
        setTimeout(() => {
            // 1. 取得原圖
            let currentData = new ImageData(
                new Uint8ClampedArray(originalImageData.data),
                originalImageData.width,
                originalImageData.height
            );

            // 2. 套用矩陣平滑 (空間濾波)
            let blurredData = applyConvolution(currentData, kernels[kernelSize]);

            // 3. 套用富士底片色彩與顆粒 (色彩濾波)
            let finalData = applyFujifilmLook(blurredData);

            // 4. 畫回畫布
            ctx.putImageData(finalData, 0, 0);
            loading.style.display = 'none';
        }, 50);
    }

    document.getElementById('btn3x3').onclick = () => processFilter('3x3');
    document.getElementById('btn5x5').onclick = () => processFilter('5x5');
    document.getElementById('btn9x9').onclick = () => processFilter('9x9');
    
    document.getElementById('btnReset').onclick = () => {
        ctx.putImageData(originalImageData, 0, 0);
    };
</script>

</body>
</html>
